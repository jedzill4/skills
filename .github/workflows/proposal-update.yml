name: proposal-update

# Comment "/update-proposal <instructions>" on an issue and this revises the
# proposal in place. It can now also: change the issue's labels, and split out
# brand-new proposal issues — it never touches repository files or opens a PR.
#
# The model only ever produces TEXT: it returns a single JSON object describing
# the desired changes (new body, label add/remove, optional new issues). Every
# write is a deterministic `gh` call, so the model can never modify code.
#
# JSON contract returned by the generator:
#   {
#     "body":   "<full replacement Markdown body for THIS issue>",
#     "labels": { "add": ["priority:high"], "remove": ["priority:low"] },
#     "new_issues": [
#       { "title": "...", "body": "...", "labels": ["state:proposal"] }
#     ]
#   }
# Every proposal body MUST carry a "## Changelog" section: one-line bullets
# summarising each revision (this run appends one).
#
# Split of responsibilities:
#   /oc ...               -> general agent (opencode.yml): can edit code, open PRs
#   /update-proposal ...  -> this workflow: revises proposals + labels only
#
# Generator config below defaults to the NVIDIA hosted catalog (free). To use
# Z.AI instead, swap the three GEN_* values for the commented Z.AI block.

on:
  issue_comment:
    types: [created]

concurrency:
  group: proposal-update-${{ github.event.issue.number }}
  cancel-in-progress: false

jobs:
  update-proposal:
    # Real issues only (not PR comments), and only when explicitly invoked.
    if: |
      github.event.issue.pull_request == null &&
      contains(github.event.comment.body, '/update-proposal')
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      issues: write
    steps:
      - name: Fetch issue context
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          gh issue view "$ISSUE_NUMBER" --repo "$REPO" \
            --json number,title,body,labels,comments > issue.json

      - name: Generate proposal update plan
        env:
          # --- NVIDIA hosted catalog (default, free) ---------------------------
          GEN_ENDPOINT: https://integrate.api.nvidia.com/v1/chat/completions
          GEN_MODEL: nvidia/nemotron-3-ultra-550b-a55b
          GEN_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
          # --- Z.AI alternative (verify endpoint/model before use) ------------
          # GEN_ENDPOINT: https://api.z.ai/api/paas/v4/chat/completions
          # GEN_MODEL: glm-5.1
          # GEN_API_KEY: ${{ secrets.ZHIPU_API_KEY }}
          # Untrusted inputs are passed via env (never inlined into the script).
          TODAY: ${{ github.event.comment.created_at }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          python3 - <<'PY'
          import json, os, re, urllib.request, urllib.error

          issue = json.load(open("issue.json"))
          labels = [lab["name"] for lab in issue.get("labels", [])]
          comments = "\n\n".join(
              f"@{c['author']['login']}: {c['body']}" for c in issue.get("comments", [])
          )
          today = (os.environ.get("TODAY") or "")[:10]
          number = os.environ["ISSUE_NUMBER"]

          system = (
              "You maintain GitHub issue proposals for an engineering-rules "
              "tracker. Respond with a SINGLE JSON object and nothing else: no "
              "code fences, no preamble, no trailing commentary. Schema:\n"
              '{"body": str, "labels": {"add": [str], "remove": [str]}, '
              '"new_issues": [{"title": str, "body": str, "labels": [str]}]}'
          )
          user = (
              f"Today: {today}\n"
              f"This issue: #{number}\n"
              f"Current title: {issue['title']}\n\n"
              f"Current body:\n{issue['body']}\n\n"
              f"Current labels: {', '.join(labels) or '(none)'}\n\n"
              f"Discussion / instructions from comments:\n{comments}\n\n"
              "Controlled label vocabulary (use ONLY these prefixes):\n"
              "  state:proposal | state:had-comments | state:approved | state:declined\n"
              "  priority:high | priority:medium | priority:low\n"
              "  area:<architecture|standards|infra|impl/...>\n"
              "  enforcer:<ast-grep|import-linter|ruff|pytest|kube-linter|script|llm>\n"
              "  type:<proposal|bug|feature|build|question>\n\n"
              "Rules:\n"
              "- `body`: full replacement Markdown for THIS issue, starting with a "
              "heading, incorporating the discussion. Keep the proposal structure.\n"
              "- The body MUST end with a `## Changelog` section: bulleted one-line "
              "summaries, oldest first. Preserve existing entries and APPEND one new "
              f"bullet for this revision, prefixed `{today}: `.\n"
              "- `labels.add` / `labels.remove`: only changes implied by the "
              "discussion, drawn from the vocabulary above. Keep exactly one state:* "
              "label. Use empty arrays when nothing changes.\n"
              "- `new_issues`: ONLY when the discussion explicitly asks to split out a "
              "separate proposal; otherwise []. Each new issue body must follow the "
              "same proposal structure and start its own `## Changelog` with "
              f"`{today}: Split out from #{number}.`"
          )
          payload = {
              "model": os.environ["GEN_MODEL"],
              "messages": [
                  {"role": "system", "content": system},
                  {"role": "user", "content": user},
              ],
              "temperature": 0.2,
              "max_tokens": 8192,
          }
          req = urllib.request.Request(
              os.environ["GEN_ENDPOINT"],
              data=json.dumps(payload).encode(),
              headers={
                  "Authorization": f"Bearer {os.environ['GEN_API_KEY']}",
                  "Content-Type": "application/json",
              },
          )
          try:
              with urllib.request.urlopen(req, timeout=600) as r:
                  resp = json.load(r)
          except urllib.error.HTTPError as e:
              print("API error", e.code, e.read().decode()[:2000])
              raise
          content = resp["choices"][0]["message"]["content"].strip()

          # The model should return bare JSON; be defensive about fences/prose.
          if content.startswith("```"):
              content = re.sub(r"^```[a-zA-Z]*\n", "", content)
              content = re.sub(r"\n```$", "", content).strip()
          start, end = content.find("{"), content.rfind("}")
          if start == -1 or end == -1:
              raise SystemExit("generator did not return a JSON object:\n" + content[:2000])
          plan = json.loads(content[start : end + 1])

          body = (plan.get("body") or "").strip()
          labels_change = plan.get("labels") or {}
          add = [str(x) for x in labels_change.get("add", []) if x]
          remove = [str(x) for x in labels_change.get("remove", []) if x]
          new_issues = plan.get("new_issues") or []

          with open("updated_body.md", "w") as f:
              f.write(body + "\n")
          with open("labels_add.txt", "w") as f:
              f.write("".join(s + "\n" for s in add))
          with open("labels_remove.txt", "w") as f:
              f.write("".join(s + "\n" for s in remove))
          with open("new_issues.json", "w") as f:
              json.dump(new_issues, f)
          PY

      - name: Validate generated body
        run: |
          test -s updated_body.md
          head -1 updated_body.md | grep -q '^#' || {
            echo "Generated body does not look like a proposal (no leading heading)."
            echo "----- generated -----"; cat updated_body.md
            exit 1
          }
          grep -q '^## Changelog' updated_body.md || {
            echo "Generated body is missing a '## Changelog' section."
            echo "----- generated -----"; cat updated_body.md
            exit 1
          }

      - name: Apply label changes
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          args=()
          # Ensure every added label exists so a typo can't fail the whole edit.
          while IFS= read -r lab; do
            [ -n "$lab" ] || continue
            gh label create "$lab" --repo "$REPO" --force >/dev/null 2>&1 || true
            args+=(--add-label "$lab")
          done < labels_add.txt
          while IFS= read -r lab; do
            [ -n "$lab" ] && args+=(--remove-label "$lab")
          done < labels_remove.txt
          if [ ${#args[@]} -gt 0 ]; then
            gh issue edit "$ISSUE_NUMBER" --repo "$REPO" "${args[@]}"
          else
            echo "No label changes."
          fi

      - name: Update issue body
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          gh issue edit "$ISSUE_NUMBER" --repo "$REPO" --body-file updated_body.md

      - name: Create new issues
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        run: |
          python3 - <<'PY'
          import json, os, subprocess, tempfile

          new_issues = json.load(open("new_issues.json"))
          repo = os.environ["REPO"]
          urls = []
          for it in new_issues:
              title = (it.get("title") or "").strip()
              body = (it.get("body") or "").strip()
              labels = [str(x) for x in (it.get("labels") or []) if x]
              if not title or not body:
                  continue
              for lab in labels:
                  subprocess.run(
                      ["gh", "label", "create", lab, "--repo", repo, "--force"],
                      capture_output=True,
                  )
              with tempfile.NamedTemporaryFile("w", suffix=".md", delete=False) as f:
                  f.write(body + "\n")
                  body_file = f.name
              cmd = ["gh", "issue", "create", "--repo", repo,
                     "--title", title, "--body-file", body_file]
              for lab in labels:
                  cmd += ["--label", lab]
              out = subprocess.run(cmd, text=True, capture_output=True)
              if out.returncode == 0:
                  urls.append(out.stdout.strip())
              else:
                  print("failed to create issue:", out.stderr.strip())
          with open("new_issue_urls.txt", "w") as f:
              f.write("".join(u + "\n" for u in urls))
          PY

      - name: Comment confirmation
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          {
            echo "Updated the proposal from this comment. ([run]($RUN_URL))"
            added=$(paste -sd, labels_add.txt 2>/dev/null)
            removed=$(paste -sd, labels_remove.txt 2>/dev/null)
            [ -n "$added" ] && echo "- Labels added: $added"
            [ -n "$removed" ] && echo "- Labels removed: $removed"
            if [ -s new_issue_urls.txt ]; then
              echo "- New issues:"
              while IFS= read -r u; do [ -n "$u" ] && echo "  - $u"; done < new_issue_urls.txt
            fi
          } > comment.md
          gh issue comment "$ISSUE_NUMBER" --repo "$REPO" --body-file comment.md

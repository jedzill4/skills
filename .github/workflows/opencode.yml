name: opencode

# Runs OpenCode inside the Actions runner when someone mentions /oc or
# /opencode in an issue comment or a PR review comment. OpenCode reads the
# thread context and can reply, push branches, or open PRs.
#
# Provider model is selected via the `with: model:` input below, sourced from
# the per-provider env vars in this block. To switch provider, point `model:`
# at the other env var (one-line change):
#   - NVIDIA (default) -> ${{ env.NVIDIA_MODEL }}   secret NVIDIA_API_KEY
#   - Z.AI             -> ${{ env.ZAI_MODEL }}      secret ZHIPU_API_KEY
#
# NVIDIA here is the hosted NVIDIA API Catalog (integrate.api.nvidia.com,
# NIM-backed) — free with an nvapi-… key but rate-limited and slower. Z.AI's
# GLM is the faster/more-reliable paid fallback.
#
# Required repo/org secrets (Settings > Secrets and variables > Actions):
#   NVIDIA_API_KEY  and/or  ZHIPU_API_KEY
# The OpenCode GitHub app must also be installed: github.com/apps/opencode-agent
env:
  # Per-provider model ids (provider/model). Both kept here so switching the
  # active provider is just repointing `with: model:` below.
  NVIDIA_MODEL: nvidia/nemotron-3-ultra-550b-a55b
  ZAI_MODEL: zai/glm-5.1

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

concurrency:
  group: opencode-${{ github.workflow }}-${{ github.event.issue.number || github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  opencode:
    if: |
      contains(github.event.comment.body, '/oc') ||
      contains(github.event.comment.body, '/opencode')
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Run OpenCode
        uses: anomalyco/opencode/github@latest
        env:
          # Provide the key(s) for whichever provider(s) you use. Unused ones
          # can stay unset.
          NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
          ZHIPU_API_KEY: ${{ secrets.ZHIPU_API_KEY }}
        with:
          # Default: NVIDIA (free). Switch to Z.AI by using ${{ env.ZAI_MODEL }}.
          model: ${{ env.NVIDIA_MODEL }}
          # share: true

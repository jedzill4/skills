name: Release

# Tag-driven (hatch-vcs): `git tag vX.Y.Z && git push origin vX.Y.Z`.
# Builds the sdist/wheel and creates a GitHub Release. PyPI publishing is a
# separate workflow (pypi.yml) triggered when this Release is published, so a
# PyPI misconfiguration never blocks the GitHub Release.

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  release:
    name: build & github release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # hatch-vcs needs the full history + tags to derive the version.
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "0.11.12"
          enable-cache: true

      - name: Build sdist and wheel
        run: uv build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/*

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: dist/*

name: Publish to PyPI

# Runs after a GitHub Release is published (release.yml). Kept separate so a
# PyPI misconfiguration fails in isolation without affecting the Release.
# Re-run manually via the Actions tab (workflow_dispatch) once Trusted
# Publishing is configured.
#
# Setup required (one-time, on PyPI) — replace <PYPI_PROJECT_NAME> below:
#   pypi.org -> project `<PYPI_PROJECT_NAME>` -> Publishing -> Add a Trusted
#   Publisher:
#     Owner: <GITHUB_OWNER>      Repository: <GITHUB_REPO>
#     Workflow: pypi.yml         Environment: pypi
# No API token/secret is needed once Trusted Publishing is set up.

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      ref:
        description: "Tag to build and publish (e.g. v0.2.0)"
        required: true

permissions:
  contents: read

jobs:
  pypi:
    name: build & publish
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/<PYPI_PROJECT_NAME>
    permissions:
      id-token: write # OIDC for Trusted Publishing
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.ref || github.ref }}
          fetch-depth: 0 # hatch-vcs needs tags/history

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "0.11.12"
          enable-cache: true

      - name: Build sdist and wheel
        run: uv build

      - name: Publish to PyPI (Trusted Publishing)
        uses: pypa/gh-action-pypi-publish@release/v1

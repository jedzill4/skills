name: Tests

# Lint, type-check and test on every push to main and every PR.
# Runs the same prek hooks as locally (ruff-format, ruff, pyrefly, hygiene)
# plus the pytest suite, all through uv so versions match uv.lock.

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: tests-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    name: lint, type-check & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "0.11.12"
          enable-cache: true

      # Uses the version pinned by .python-version / pyproject.toml.
      - name: Set up Python
        run: uv python install

      # --frozen fails if uv.lock is out of date. Add --extra / --group flags
      # here if the test suite needs optional dependencies.
      - name: Install dependencies
        run: uv sync --frozen

      - name: Lint, format & type check (prek)
        run: uvx prek run --all-files --show-diff-on-failure

      - name: Run tests
        run: uv run pytest

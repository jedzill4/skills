[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src"]

[project]
name = "replace-me"
version = "0.1.0"
description = "Replace me"
readme = "README.md"
requires-python = ">=3.12,<3.13"

# MARK: Dependencies
dependencies = []

# MARK: Extra deps
[dependency-groups]
dev = [
  "pytest>=8.3.3",
  "pytest-asyncio>=0.24.0",
  "pytest-timeout>=2.3.1",
  "ruff>=0.7.0",
]

# MARK: Ruff
[tool.ruff]
line-length = 100

[tool.ruff.lint]
select = [
  "E",
  "F",
  "B",
  "SIM",
  "RET",
  "C4",
  "DTZ",
  "PTH",
  "LOG",
  "S",
  "C90",
  "G",
  "UP",
  "RUF",
  "ERA001",
  "D200",
  "D205",
  "D212",
  "D300",
  "D301",
  "D400",
  "D401",
  "D403",
  "D405",
  "D406",
  "D407",
  "D408",
  "D409",
  "D410",
  "D411",
  "D412",
  "D413",
  "D414",
  "D415",
  "D417",
  "D418",
  "D419",
]
task-tags = ["TODO", "FIXME", "XXX", "MARK"]

[tool.ruff.lint.pydocstyle]
convention = "google"

[tool.ruff.lint.mccabe]
max-complexity = 10

[tool.ruff.lint.per-file-ignores]
"tests/**" = ["S101"]

# MARK: Pyrefly
[tool.pyrefly]
project-excludes = [
  "**/node_modules",
  "**/__pycache__",
  "**/venv/**/*",
  "**/.venv/**/*",
  "**/.uv_cache/**/*",
]
use-ignore-files = false
disable-project-excludes-heuristics = true

# MARK: Pytest
[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
markers = [
  "unit: fast isolated tests, no external deps",
  "integration: tests requiring external services or multi-component interaction",
  "e2e: end-to-end smoke tests",
]

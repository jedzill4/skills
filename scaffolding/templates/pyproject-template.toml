[build-system]
requires = ["hatchling", "hatch-vcs"]
build-backend = "hatchling.build"

# Version derived from git tags (vX.Y.Z) by hatch-vcs.
[tool.hatch.version]
source = "vcs"

[tool.hatch.build.targets.wheel]
packages = ["src"]

# MARK: Ruff
[tool.ruff]
line-length = 100

[tool.ruff.format]
quote-style = "double"

[tool.ruff.lint]
select = [
  "E",
  "F",
  "I",
  "C4",
  "C90",
  "ICN",
  "INP",
  "PIE",
  "PT",
  "TC",
  "PGH",
  "NPY",
  "PLE",
  "PLW",
  "FA",
  "B",
  "S",
  "G",
  "SIM",
  "RET",
  "DTZ",
  "PTH",
  "LOG",
  "TID",
  "UP",
  "RUF",
  "ERA001",
  "D200",
  "D205",
  "D212",
  "D300",
  "D301",
  "D400",
  "D401",
  "D403",
  "D405",
  "D406",
  "D407",
  "D408",
  "D409",
  "D410",
  "D411",
  "D412",
  "D413",
  "D414",
  "D415",
  "D417",
  "D418",
  "D419",
  "PERF",
]
task-tags = ["TODO", "FIXME", "XXX", "MARK"]

[tool.ruff.lint.pydocstyle]
convention = "google"

[tool.ruff.lint.mccabe]
max-complexity = 10

# Ban relative imports (e.g. `from .module import ...`) in favor of absolute
# package imports, so modules are unambiguous and easy to move.
[tool.ruff.lint.flake8-tidy-imports]
ban-relative-imports = "all"

[tool.ruff.lint.per-file-ignores]
"tests/**" = ["S101", "INP001"]

# MARK: Pyrefly
[tool.pyrefly]
project-excludes = [
  "**/node_modules",
  "**/__pycache__",
  "**/venv/**/*",
  "**/.venv/**/*",
  "**/.uv_cache/**/*",
]
use-ignore-files = false
disable-project-excludes-heuristics = true

# MARK: import-linter (CES-5 layer direction, CES-17 api-boundary layout)
# Commented skeleton — uncomment once the package actually has layers. Enforces the house import
# direction: entrypoints -> api -> database/impl -> core (a higher layer may import lower ones,
# never the reverse). Add `import-linter` to the dev group and run `uvx --from import-linter
# lint-imports`. Replace `myapp` below with your import package name.
#
# [tool.importlinter]
# root_package = "myapp"
#
# [[tool.importlinter.contracts]]
# name = "Layered architecture (CES-5)"
# type = "layers"
# layers = [
#   "myapp.entrypoints",
#   "myapp.api",
#   "myapp.database | myapp.impl",
#   "myapp.core",
# ]
#
# # CES-17 api-boundary layout: the api package is the only inbound HTTP boundary; nothing
# # outside api may import api.schemas/routers internals.
# [[tool.importlinter.contracts]]
# name = "API is the only inbound boundary (CES-17)"
# type = "forbidden"
# source_modules = ["myapp.core", "myapp.database"]
# forbidden_modules = ["myapp.api"]

# MARK: Pytest
[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
markers = [
  "unit: fast isolated tests, no external deps",
  "integration: tests requiring external services or multi-component interaction",
  "e2e: end-to-end smoke tests",
]

[project]
name = "replace-me"
dynamic = ["version"]
description = "Replace me"
readme = "README.md"
# CES-77 (version pin): requires-python is intentionally left as a non-enforced comment so an
# existing repo's pin wins (pairs with general-respect-local-repo, CES-30). The house baseline
# default is 3.14 — uncomment and adjust only when you deliberately set a floor:
# requires-python = ">=3.14"

# MARK: Dependencies
dependencies = []

# MARK: Extra deps
[dependency-groups]
dev = [
  "pytest>=8.3.3",
  "pytest-asyncio>=0.24.0",
  "pytest-timeout>=2.3.1",
  "ruff>=0.7.0",
]
